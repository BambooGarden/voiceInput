<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice Input - Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .context-box {
            width: 100%;
            max-width: 600px;
            background: #0f3460;
            border: 1px solid #1a5276;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 30px;
            min-height: 60px;
        }
        .context-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .context-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .clear-btn {
            background: #333;
            border: 1px solid #555;
            color: #aaa;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .clear-btn:hover { background: #444; color: #fff; }
        .context-text {
            font-size: 20px;
            color: #4ecdc4;
            min-height: 28px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .context-text.empty { color: #555; font-style: italic; font-size: 14px; }
        .record-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #444;
            background: #2d2d44;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .record-btn:hover { border-color: #666; background: #3d3d55; }
        .record-btn.recording {
            border-color: #ff4444;
            background: #442d2d;
            animation: pulse 1.5s infinite;
        }
        .record-btn .icon {
            width: 40px;
            height: 40px;
            background: #ff4444;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .record-btn.recording .icon {
            border-radius: 6px;
            width: 30px;
            height: 30px;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
        }
        .status { color: #888; margin-bottom: 30px; min-height: 24px; }
        .results {
            width: 100%;
            max-width: 600px;
            background: #16213e;
            border-radius: 12px;
            padding: 24px;
            display: none;
        }
        .results.show { display: block; }
        .result-row {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a4a;
        }
        .result-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .result-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .result-value { font-size: 18px; }
        .result-value.clean { color: #4ecdc4; font-size: 22px; font-weight: 600; }
        .result-value.raw { color: #999; font-size: 14px; }
        .intent-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .intent-input { background: #1b4332; color: #52b788; }
        .intent-correction { background: #4a1942; color: #e040fb; }
        .intent-command { background: #1a3a5c; color: #64b5f6; }
        .intent-noise { background: #333; color: #888; }
        .history {
            width: 100%;
            max-width: 600px;
            margin-top: 24px;
        }
        .history h3 { color: #666; font-size: 14px; margin-bottom: 12px; }
        .history-item {
            background: #16213e;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-text { font-size: 16px; flex: 1; }
        .history-raw { font-size: 11px; color: #666; margin-top: 4px; }
        .history-intent { font-size: 12px; margin-left: 12px; }
    </style>
</head>
<body>
    <h1>Smart Voice Input</h1>
    <p class="subtitle">Press and hold to record. LLM understands your intent.</p>

    <div class="context-box">
        <div class="context-header">
            <span class="context-label">Accumulated Input</span>
            <button class="clear-btn" onclick="clearContext()">Clear</button>
        </div>
        <div class="context-text empty" id="contextText">Start speaking...</div>
    </div>

    <button class="record-btn" id="recordBtn">
        <div class="icon"></div>
    </button>
    <div class="status" id="status">Ready</div>

    <div class="results" id="results">
        <div class="result-row">
            <div class="result-label">LLM Clean Output</div>
            <div class="result-value clean" id="cleanText"></div>
        </div>
        <div class="result-row">
            <div class="result-label">Raw Transcription (Whisper)</div>
            <div class="result-value raw" id="rawText"></div>
        </div>
        <div class="result-row">
            <div class="result-label">Intent</div>
            <div class="result-value"><span class="intent-badge" id="intentBadge"></span></div>
        </div>
    </div>

    <div class="history" id="historyContainer" style="display:none">
        <h3>History</h3>
        <div id="history"></div>
    </div>

    <script>
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('status');
        const results = document.getElementById('results');
        const historyContainer = document.getElementById('historyContainer');
        const historyDiv = document.getElementById('history');
        const contextText = document.getElementById('contextText');

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        btn.addEventListener('mousedown', startRecording);
        btn.addEventListener('mouseup', stopRecording);
        btn.addEventListener('mouseleave', stopRecording);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

        async function startRecording() {
            if (isRecording) return;
            isRecording = true;
            audioChunks = [];
            btn.classList.add('recording');
            status.textContent = 'Recording...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = processAudio;
                mediaRecorder.start();
            } catch (err) {
                status.textContent = 'Microphone access denied';
                btn.classList.remove('recording');
                isRecording = false;
            }
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            btn.classList.remove('recording');
            status.textContent = 'Processing (ASR + LLM)...';
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            }
        }

        async function processAudio() {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');

            try {
                const resp = await fetch('/transcribe', { method: 'POST', body: formData });
                const data = await resp.json();

                if (data.status === 'no_speech') {
                    status.textContent = 'No speech detected - try again';
                    return;
                }
                if (data.status === 'empty') {
                    status.textContent = 'Could not transcribe - try speaking clearer';
                    return;
                }
                if (data.status === 'error' || data.status === 'too_short') {
                    status.textContent = data.message;
                    return;
                }

                status.textContent = 'Done!';
                results.classList.add('show');

                document.getElementById('cleanText').textContent = data.clean_text || '(none)';
                document.getElementById('rawText').textContent = data.raw_text;

                const badge = document.getElementById('intentBadge');
                badge.textContent = data.intent;
                badge.className = 'intent-badge intent-' + data.intent;

                // Update context display
                if (data.context) {
                    contextText.textContent = data.context;
                    contextText.classList.remove('empty');
                }

                addHistory(data);
            } catch (err) {
                status.textContent = 'Error: ' + err.message;
            }
        }

        function addHistory(data) {
            historyContainer.style.display = 'block';
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div>
                    <div class="history-text">${data.clean_text || data.raw_text}</div>
                    <div class="history-raw">raw: ${data.raw_text}</div>
                </div>
                <span class="intent-badge intent-${data.intent} history-intent">${data.intent}</span>
            `;
            historyDiv.insertBefore(item, historyDiv.firstChild);
        }

        async function clearContext() {
            await fetch('/clear', { method: 'POST' });
            contextText.textContent = 'Start speaking...';
            contextText.classList.add('empty');
            historyDiv.innerHTML = '';
            historyContainer.style.display = 'none';
            results.classList.remove('show');
            status.textContent = 'Context cleared';
        }
    </script>
</body>
</html>
